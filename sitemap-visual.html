<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paragliding School — Site Structure</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Inter', sans-serif;
    background: #F9F7F4;
    color: #1C1917;
    padding: 40px 32px;
    min-height: 100vh;
  }
  h1 {
    font-family: Georgia, serif;
    font-size: 28px;
    font-weight: 700;
    color: #1B3A5C;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: #6B7280;
    margin-bottom: 36px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .tier {
    background: white;
    border-radius: 12px;
    border: 1px solid #E8EEF4;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .tier:hover { box-shadow: 0 4px 20px rgba(27,58,92,0.08); }
  .tier-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tier-num {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.5;
  }
  .tier-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tier-body { padding: 0 18px 16px; }
  .page {
    padding: 10px 0;
    border-bottom: 1px solid #F0F0F0;
    cursor: pointer;
  }
  .page:last-child { border-bottom: none; }
  .page-url {
    font-size: 12px;
    font-weight: 600;
    color: #3D6B96;
    font-family: monospace;
    margin-bottom: 4px;
  }
  .page-label {
    font-size: 13px;
    color: #1C1917;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .sections {
    display: none;
    margin-top: 8px;
    padding: 10px 12px;
    background: #F9F7F4;
    border-radius: 8px;
    border-left: 3px solid #E8EEF4;
  }
  .page.open .sections { display: block; }
  .page.open .page-url { color: #1B3A5C; }
  .section-item {
    font-size: 12px;
    color: #6B7280;
    padding: 3px 0;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .section-item::before {
    content: '↳';
    color: #F59E0B;
    font-size: 11px;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-money { background: #FEF3C7; color: #92400E; }
  .badge-seo { background: #DBEAFE; color: #1D4ED8; }
  .badge-cms { background: #D1FAE5; color: #065F46; }
  .badge-legal { background: #F3F4F6; color: #374151; }

  /* Tier colors */
  .t1 .tier-header { background: #1B3A5C; }
  .t1 .tier-title, .t1 .tier-num { color: white; }
  .t2 .tier-header { background: #F59E0B; }
  .t2 .tier-title, .t2 .tier-num { color: #1C1917; }
  .t3 .tier-header { background: #2D5016; }
  .t3 .tier-title, .t3 .tier-num { color: white; }
  .t4 .tier-header { background: #3D6B96; }
  .t4 .tier-title, .t4 .tier-num { color: white; }
  .t5 .tier-header { background: #E8EEF4; }
  .t5 .tier-title, .t5 .tier-num { color: #1B3A5C; }
  .t6 .tier-header { background: #92400E; }

  .t7 .tier-header { background: #6B7280; }
  .t7 .tier-title, .t7 .tier-num { color: white; }
  .t8 .tier-header { background: #1B3A5C; opacity-header: 0.7; background: #4B6F8A; }
  .t8 .tier-title, .t8 .tier-num { color: white; }
  .t9 .tier-header { background: #F59E0B; }
  .t9 .tier-title, .t9 .tier-num { color: #1C1917; }
  .t10 .tier-header { background: #F3F4F6; }
  .t10 .tier-title, .t10 .tier-num { color: #374151; }

  .legend {
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6B7280; }
  .hint {
    font-size: 12px;
    color: #9CA3AF;
    text-align: center;
    margin-top: 32px;
  }
  .priority-star {
    color: #F59E0B;
    font-size: 13px;
    margin-left: 4px;

const grid = document.getElementById('grid');

tiers.forEach(tier => {
  const div = document.createElement('div');
  div.className = `tier ${tier.cls}`;
  let html = `<div class="tier-header"><span class="tier-num">${tier.num}</span><span class="tier-title">${tier.title}</span></div><div class="tier-body">`;

    const badges = (page.badges||[]).map(b => `<span class="badge badge-${b}">${badgeMap[b][0]}</span>`).join('');
    const secs = (page.sections||[]).map(s => `<div class="section-item">${s}</div>`).join('');
    html += `<div class="page" onclick="this.classList.toggle('open')">
      <div class="page-url">${page.url}</div>
      <div class="page-label">${page.label}${badges}</div>
      ${secs ? `<div class="sections">${secs}</div>` : ''}
    </div>`;
  });
  html += '</div>';
  div.innerHTML = html;
  grid.appendChild(div);
});
